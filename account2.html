<!DOCTYPE html>
<html>
<head>
<title>Accounts Dashboard (Term System)</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
}

.container{
    width:900px;
    margin:auto;
    padding:20px;
}

.box{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input,select,button{
    width:100%;
    padding:10px;
    margin:5px 0;
}

button{
    border:none;
    cursor:pointer;
    color:white;
}

.green{background:#16a34a;}
.blue{background:#2563eb;}
.orange{background:#f59e0b;}
.red{background:#dc2626;}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}
</style>
</head>

<body>

<h2 style="text-align:center;">💰 ACCOUNTS DASHBOARD (TERM SYSTEM)</h2>

<div class="container">

<!-- SET FEES -->
<div class="box">
<h3>📌 Set Term Fee (ALL Students)</h3>

<select id="set_term">
<option>Term 1</option>
<option>Term 2</option>
<option>Term 3</option>
</select>

<input id="term_fee" type="number" placeholder="Enter Term Fee (MWK)">
<button class="blue" onclick="setFee()">Set Fee for All</button>

<p id="msg"></p>
</div>

<!-- PAYMENT -->
<div class="box">
<h3>💵 Record Payment</h3>

<input id="reg" placeholder="Student Reg No">

<select id="payment_term">
<option>Term 1</option>
<option>Term 2</option>
<option>Term 3</option>
</select>

<input id="amount" type="number" placeholder="Amount Paid">
<button class="green" onclick="recordPayment()">Save Payment</button>
</div>

<!-- VIEW TERM -->
<div class="box">
<h3>📊 View Students by Term</h3>

<select id="view_term" onchange="render(students)">
<option>Term 1</option>
<option>Term 2</option>
<option>Term 3</option>
</select>

</div>

<!-- FILTERS -->
<div class="box">

<button class="blue" onclick="loadAll()">All</button>
<button class="green" onclick="loadPaid()">Fully Paid</button>
<button class="orange" onclick="loadPartial()">Partial</button>
<button class="red" onclick="loadUnpaid()">Unpaid</button>

</div>

<!-- TABLE -->
<div class="box">

<table>
<thead>
<tr>
<th>Name</th>
<th>Reg No</th>
<th>Fee</th>
<th>Paid</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "secondary-dexter-system.firebaseapp.com",
projectId: "secondary-dexter-system",
storageBucket: "secondary-dexter-system.firebasestorage.app",
messagingSenderId: "858654232789",
appId: "1:858654232789:web:2e3ee303ef52258dfd525c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let students = [];

/* LOAD STUDENTS */
async function loadStudents(){

let snap = await getDocs(collection(db,"students"));

students = [];

snap.forEach(d=>{
students.push({id:d.id,...d.data()});
});

render(students);
}

/* GET TERM */
function getTerm(id){
return document.getElementById(id).value;
}

/* RENDER */
function render(data){

let term = getTerm("view_term");

let rows = "";

data.forEach(s=>{

let feeData = s.fees?.[term] || {};

let fee = feeData.fee || 0;
let paid = feeData.paid || 0;
let balance = fee - paid;

rows += `
<tr>
<td>${s.full_name}</td>
<td>${s.reg_no}</td>
<td>${fee}</td>
<td>${paid}</td>
<td>${balance}</td>
</tr>
`;
});

document.getElementById("data").innerHTML = rows;
}

/* SET FEE FOR ALL */
window.setFee = async function(){

let term = getTerm("set_term");
let fee = Number(document.getElementById("term_fee").value);

if(!fee || fee <= 0){
alert("Enter valid fee");
return;
}

for(let s of students){

let fees = s.fees || {};

fees[term] = {
fee: fee,
paid: 0,
balance: fee
};

await updateDoc(doc(db,"students",s.id),{
fees: fees
});
}

document.getElementById("msg").innerText = "Fees set successfully ✔";

loadStudents();
};

/* RECORD PAYMENT WITH OVERPAYMENT CHECK */
window.recordPayment = async function(){

let reg = document.getElementById("reg").value;
let amount = Number(document.getElementById("amount").value);
let term = getTerm("payment_term");

if(!reg || !amount || amount <= 0){
alert("Enter valid data");
return;
}

for(let s of students){

if(s.reg_no === reg){

let fees = s.fees || {};

let fee = fees[term]?.fee || 0;
let paid = fees[term]?.paid || 0;
let balance = fee - paid;

// ❌ OVERPAYMENT CHECK
if(amount > balance){
alert("❌ Payment exceeds balance! Remaining: MWK " + balance);
return;
}

paid += amount;
balance = fee - paid;

fees[term] = {
fee: fee,
paid: paid,
balance: balance
};

await updateDoc(doc(db,"students",s.id),{
fees: fees
});

alert("✅ Payment recorded");
}
}

loadStudents();
};

/* FILTERS */
window.loadAll = ()=>render(students);

window.loadPaid = ()=>{

let term = getTerm("view_term");

render(students.filter(s=>{
let f = s.fees?.[term];
return f && f.balance <= 0;
}));
};

window.loadPartial = ()=>{

let term = getTerm("view_term");

render(students.filter(s=>{
let f = s.fees?.[term];
return f && f.paid > 0 && f.balance > 0;
}));
};

window.loadUnpaid = ()=>{

let term = getTerm("view_term");

render(students.filter(s=>{
let f = s.fees?.[term];
return !f || f.paid === 0;
}));
};

/* INIT */
loadStudents();

</script>

</body>
</html>
