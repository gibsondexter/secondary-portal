<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
}

h2{
    text-align:center;
    margin:15px 0;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    padding:10px;
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:15px;
}

.box{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select,button{
    width:100%;
    padding:12px;
    margin:6px 0;
    font-size:15px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#msg{
    grid-column: span 2;
    text-align:center;
    font-weight:bold;
}

.viewBox{
    grid-column: span 2;
    background:white;
    padding:15px;
    border-radius:12px;
}

/* ================= TOP HEADER ================= */
.topHeader{
    text-align:center;
    background:white;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.topHeader img{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
}

.topHeader h1{
    margin:10px 0 5px;
}

.topHeader p{
    margin:0;
    color:gray;
}
</style>
</head>

<body>

<!-- ================= SCHOOL HEADER ================= -->
<div class="topHeader">
    <img id="schoolLogo" src="" alt="Logo">
    <h1 id="schoolNameTop">Loading School...</h1>
    <p id="schoolMottoTop"></p>
</div>
<!-- 🔥 ERASE BUTTON (ADDED ONLY) -->
<div style="text-align:center; margin:10px;">
    <button onclick="eraseDatabase()" style="background:red; color:white; padding:12px 20px; border:none; border-radius:8px; cursor:pointer;">
        🗑️ ERASE ALL DATABASE
    </button>
</div>

<h2>👨‍💼 ADMIN DASHBOARD (FULL SYSTEM)</h2>

<div class="container">

<!-- SCHOOL SETTINGS -->
<div class="box">
<h3>🏫 School Settings</h3>

<input id="sch_name" placeholder="School Name">
<input id="sch_motto" placeholder="School Motto">
<input id="sch_year" placeholder="Academic Year">
<input id="sch_term" placeholder="Term">
<input id="sch_contact" placeholder="Contact Number">

<button onclick="saveSchoolSettings()">Save Settings</button>
</div>

<!-- STUDENT -->
<div class="box">
<h3>🎓 Add Student</h3>

<input id="sname" placeholder="Full Name">
<input id="sdob" type="date">
<input id="sparent" placeholder="Parent Name">
<input id="sphone" placeholder="Parent Phone">

<input id="sreg" placeholder="Reg Number">
<input id="spass" placeholder="Password">

<select id="sclass">
    <option>Form1</option>
    <option>Form2</option>
    <option>Form3</option>
    <option>Form4</option>
</select>

<button onclick="addStudent()">Add Student</button>
</div>

<!-- TEACHER -->
<div class="box">
<h3>🧑‍🏫 Add Teacher</h3>

<input id="tname" placeholder="Full Name">
<input id="tuser" placeholder="Username">
<input id="tpass" placeholder="Password">

<select id="tdept">
    <option>Mathematics</option>
    <option>Science</option>
    <option>Languages</option>
    <option>Humanities</option>
</select>

<button onclick="addTeacher()">Add Teacher</button>
</div>

<!-- SUBJECT -->
<div class="box">
<h3>📚 Add Subject</h3>

<input id="subject" placeholder="Subject Name">

<select id="sdept">
    <option>Mathematics</option>
    <option>Science</option>
    <option>Languages</option>
    <option>Humanities</option>
</select>

<button onclick="addSubject()">Add Subject</button>
</div>

<!-- ACCOUNTANT -->
<div class="box">
<h3>💰 Add Accountant</h3>

<input id="aname" placeholder="Full Name">
<input id="auser" placeholder="Username">
<input id="apass" placeholder="Password">

<button onclick="addAccountant()">Add Accountant</button>
</div>

<!-- ADMIN -->
<div class="box">
<h3>👨‍💼 Add Admin</h3>

<input id="admin_name" placeholder="Full Name">
<input id="admin_user" placeholder="Username">
<input id="admin_pass" placeholder="Password">

<button onclick="addAdmin()">Add Admin</button>
</div>

<!-- ICT / HOD -->
<div class="box">
<h3>🧠 Add ICT / HOD</h3>

<input id="off_name" placeholder="Full Name">
<input id="off_user" placeholder="Username">
<input id="off_pass" placeholder="Password">

<select id="off_role">
    <option>ICT Manager</option>
    <option>Head of Department</option>
</select>

<select id="off_dept">
    <option>Mathematics</option>
    <option>Science</option>
    <option>Languages</option>
    <option>Humanities</option>
</select>

<button onclick="addOfficer()">Add</button>
</div>

<!-- PREFECT -->
<div class="box">
<h3>🏫 Add Prefect</h3>

<input id="pname" placeholder="Student Name">

<select id="pclass">
    <option>Form1</option>
    <option>Form2</option>
    <option>Form3</option>
    <option>Form4</option>
</select>

<input id="prole" placeholder="Prefect Role">

<button onclick="addPrefect()">Add Prefect</button>
</div>

<!-- ASSIGN -->
<div class="box">
<h3>🔗 Assign Teacher</h3>

<select id="at_teacher">
    <option>Loading teachers...</option>
</select>
<input id="at_subject" placeholder="Subject">

<select id="at_class">
    <option>Form1</option>
    <option>Form2</option>
    <option>Form3</option>
    <option>Form4</option>
</select>

<button onclick="assignTeacher()">Assign</button>
</div>

<!-- VIEW -->
<div class="box">
<h3>📊 View Data</h3>

<button onclick="viewTeachers()">All Teachers</button>
<button onclick="viewForm('Form1')">Form 1</button>
<button onclick="viewForm('Form2')">Form 2</button>
<button onclick="viewForm('Form3')">Form 3</button>
<button onclick="viewForm('Form4')">Form 4</button>
<button onclick="viewPrefects()">Prefects</button>
</div>

<p id="msg"></p>

<div class="viewBox">
<h3>📌 Output</h3>
<div id="output"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
setDoc,
doc,
getDocs,
query,
where,
getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "secondary-dexter-system.firebaseapp.com",
projectId: "secondary-dexter-system",
storageBucket: "secondary-dexter-system.appspot.com",
messagingSenderId: "858654232789",
appId: "1:858654232789:web:d8b374c700c6a135fd525c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const get = (id) => document.getElementById(id);

function show(text,color="green"){
document.getElementById("msg").innerText = text;
document.getElementById("msg").style.color = color;
}
/* ================= LOAD TEACHERS INTO DROPDOWN ================= */
async function loadTeachersDropdown(){
    try{
        let snap = await getDocs(collection(db,"teachers"));
        let select = document.getElementById("at_teacher");

        select.innerHTML = "<option value=''>Select Teacher</option>";

        snap.forEach(docSnap=>{
            let data = docSnap.data();

            let option = document.createElement("option");
            option.value = data.username;
            option.textContent = `${data.full_name} (${data.username})`;

            select.appendChild(option);
        });

    }catch(err){
        console.log(err);
    }
}

loadTeachersDropdown();
/* ================= ERASE DATABASE ================= */
window.eraseDatabase = async ()=>{

    if(!confirm("⚠ This will delete ALL DATA EXCEPT ADMINS. Continue?")){
        return;
    }

    try{

        const collections = [
            "student2",
            "teacher",
            "accountant2",
            "ict",
            "prefects",
            "subjects",
            "officer",
            "settings"
        ];

        for(let col of collections){

            let snap = await getDocs(collection(db, col));

            snap.forEach(async (d)=>{
                await deleteDoc(doc(db, col, d.id));
            });

        }

        show("🔥 DATA CLEARED (ADMINS SAFE) ✔");

    } catch(err){
        show("Error: " + err.message, "red");
    }
};

/* ================= SCHOOL HEADER LOAD ================= */
async function loadSchool(){

const snap = await getDoc(doc(db,"settings","school"));

if(snap.exists()){
let d = snap.data();

document.getElementById("schoolNameTop").innerText =
d.name || "School Name";

document.getElementById("schoolMottoTop").innerText =
d.motto || "School Motto";

if(d.logo){
document.getElementById("schoolLogo").src = d.logo;
}
}
}

loadSchool();

/* ================= SCHOOL SETTINGS ================= */
window.saveSchoolSettings = async ()=>{

await setDoc(doc(db,"settings","school"),{
name: get("sch_name").value,
motto: get("sch_motto").value,
academic_year: get("sch_year").value,
term: get("sch_term").value,
contact: get("sch_contact").value
});

show("School settings saved ✔");
}

/* ================= STUDENT ================= */
window.addStudent = async ()=>{
await setDoc(doc(db,"students",sreg.value),{
full_name:sname.value,
reg_no:sreg.value,
password:spass.value,
form:sclass.value,
dob:sdob.value,
parent_name:sparent.value,
parent_phone:sphone.value,
fees_balance:0
});
show("Student added ✔");
}

/* ================= TEACHER ================= */
window.addTeacher = async ()=>{
await setDoc(doc(db,"teachers",tuser.value),{
full_name:tname.value,
username:tuser.value,
password:tpass.value,
department:tdept.value,
role:"teacher"
});
show("Teacher added ✔");
}

/* ================= SUBJECT ================= */
window.addSubject = async ()=>{
await addDoc(collection(db,"subjects"),{
name:subject.value,
department:sdept.value
});
show("Subject added ✔");
}

/* ================= ACCOUNTANT ================= */
window.addAccountant = async ()=>{
await setDoc(doc(db,"accountants",auser.value),{
full_name:aname.value,
username:auser.value,
password:apass.value,
role:"accountant"
});
show("Accountant added ✔");
}

/* ================= ADMIN ================= */
window.addAdmin = async ()=>{
await setDoc(doc(db,"admins",admin_user.value),{
full_name:admin_name.value,
username:admin_user.value,
password:admin_pass.value,
role:"admin"
});
show("Admin added ✔");
}

/* ================= OFFICER ================= */
window.addOfficer = async ()=>{
await setDoc(doc(db,"officers",off_user.value),{
full_name:off_name.value,
username:off_user.value,
password:off_pass.value,
role:off_role.value,
department:off_dept.value
});
show("Officer added ✔");
}

/* ================= PREFECT ================= */
window.addPrefect = async ()=>{
await addDoc(collection(db,"prefects"),{
name:pname.value,
class:pclass.value,
role:prole.value
});
show("Prefect added ✔");
}

/* ================= ASSIGN ================= */
window.assignTeacher = async ()=>{
await addDoc(collection(db,"teacher_assignments"),{
teacher_username:at_teacher.value,
subject:at_subject.value,
form:at_class.value
});
show("Assigned ✔");
}

/* ================= VIEW ================= */
window.viewTeachers = async ()=>{
let snap = await getDocs(collection(db,"teachers"));
let out="";
snap.forEach(d=>{
let x=d.data();
out+=`${x.full_name} - ${x.department}<br>`;
});
output.innerHTML=out;
}

window.viewForm = async (form)=>{
let q=query(collection(db,"students"),where("form","==",form));
let snap=await getDocs(q);

let out="";
snap.forEach(d=>{
let x=d.data();
out+=`${x.full_name} (${x.reg_no})<br>`;
});
output.innerHTML=out;
}

window.viewPrefects = async ()=>{
let snap=await getDocs(collection(db,"prefects"));
let out="";
snap.forEach(d=>{
let x=d.data();
out+=`${x.name} - ${x.class} - ${x.role}<br>`;
});
output.innerHTML=out;
}

</script>

</body>
</html>
